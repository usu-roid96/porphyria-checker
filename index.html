<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drug Search</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        input { width: 100%; padding: 10px; margin-bottom: 20px; box-sizing: border-box; }
        .drug-item { padding: 10px; border-bottom: 1px solid #ccc; }
        .status-safe { color: green; font-weight: bold; }
        .status-unsafe { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>薬の安全検索</h1>
    <input type="text" id="searchInput" placeholder="薬の名前を入力してください...">
    <div id="results"></div>

    <script>
        let drugs = [];

        // drugs.json を読み込む
        fetch('drugs.json')
            .then(response => response.json())
            .then(data => {
                drugs = data;
                console.log("Loaded " + drugs.length + " drugs");
            })
            .catch(err => console.error("Error loading JSON:", err));

        const searchInput = document.getElementById('searchInput');
        const resultsDiv = document.getElementById('results');

        searchInput.addEventListener('input', () => {
            const query = searchInput.value.toLowerCase();
            resultsDiv.innerHTML = '';
            
            if (query.length < 1) return;

            const filtered = drugs.filter(d => 
                d.name_en.toLowerCase().includes(query) || 
                d.name_jp.includes(query)
            );

            filtered.forEach(d => {
                const div = document.createElement('div');
                div.className = 'drug-item';
                div.innerHTML = `
                    <strong>${d.name_jp}</strong> (${d.name_en})<br>
                    状態: <span class="${d.status === 'Safe' ? 'status-safe' : 'status-unsafe'}">${d.status}</span>
                `;
                resultsDiv.appendChild(div);
            });
        });
    </script>
</body>
</html>
