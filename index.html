<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Drug Search</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        input { width: 100%; padding: 10px; margin-bottom: 20px; }
        .drug-item { padding: 10px; border-bottom: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>薬の安全検索</h1>
    <input type="text" id="searchInput" placeholder="薬の名前を入力...">
    <div id="results"></div>
    <script>
        let drugs = [];
        fetch('drugs.json').then(r => r.json()).then(data => { drugs = data; });
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const res = document.getElementById('results');
            res.innerHTML = '';
            if (q.length < 1) return;
            drugs.filter(d => d.name_jp.includes(q) || d.name_en.toLowerCase().includes(q))
                 .forEach(d => {
                     const div = document.createElement('div');
                     div.className = 'drug-item';
                     div.innerHTML = `<strong>${d.name_jp}</strong> (${d.name_en})<br>状態: ${d.status}`;
                     res.appendChild(div);
                 });
        });
    </script>
</body>
</html>s
